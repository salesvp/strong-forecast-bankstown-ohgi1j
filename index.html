<body>
<div class="topbar">
  <span class="tb-wordmark">STRONG</span>
  <span class="tb-label">Revenue Forecasts</span>
</div>
<div class="page-header">
  <div class="page-header-inner">
    <div class="crumb">Reports <span>&#8250;</span> Bankstown <span>&#8250;</span> Forecast</div>
    <h1>BANKSTOWN</h1>
    <div class="meta-pills">
      <span class="meta-pill">Revenue Forecasts</span>
    </div>
  </div>
</div>
<div class="content" id="report-list">
  <div class="loading">Loading forecasts...</div>
</div>
<script>
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function parseForecast(filename) {
  var m = filename.match(/^strong-.+-revenue-forecast-(\d{2})-(\d{4})\.html$/);
  if (!m) return null;
  var mi = parseInt(m[1]) - 1;
  var year = parseInt(m[2]);
  var monthName = MONTHS[mi];
  
  return {
    filename: filename,
    month: mi,
    year: year,
    sortKey: year * 100 + mi,
    title: monthName + ' ' + year,
    subtitle: 'Forecast issued ' + monthName + ' ' + year
  };
}

fetch('https://api.github.com/repos/salesvp/strong-forecast-bankstown-ohgi1j/contents/')
  .then(function(r) { return r.json(); })
  .then(function(files) {
    var forecasts = [];
    files.forEach(function(f) {
      if (f.name === 'index.html' || f.name === 'README.md') return;
      if (!f.name.endsWith('.html')) return;
      var parsed = parseForecast(f.name);
      if (parsed) forecasts.push(parsed);
    });
    
    forecasts.sort(function(a, b) { return b.sortKey - a.sortKey; });
    
    if (forecasts.length === 0) {
      document.getElementById('report-list').innerHTML = '<div class="loading">No forecasts available yet.</div>';
      return;
    }
    
    var byYear = {};
    forecasts.forEach(function(r) {
      if (!byYear[r.year]) byYear[r.year] = [];
      byYear[r.year].push(r);
    });
    
    var years = Object.keys(byYear).sort(function(a,b) { return b - a; });
    var html = '';
    
    years.forEach(function(year, i) {
      var rows = '';
      byYear[year].forEach(function(r) {
        rows += '<a href="' + r.filename + '" class="report-row"><div><div class="name">' + r.title + '</div><div class="date">' + r.subtitle + '</div></div><div class="chevron">\u203A</div></a>';
      });
      
      html += '<div class="section-card' + (i === 0 ? ' open' : '') + '" id="y' + year + '">' +
        '<div class="section-card-header" onclick="this.parentElement.classList.toggle(\x27open\x27)">' +
        '<div class="left"><div class="label">Forecasts</div><div class="title">' + year + '</div></div>' +
        '<span class="icon">\u25BC</span></div>' +
        '<div class="section-card-body"><div class="section-card-body-inner">' + rows + '</div></div></div>';
    });
    
    document.getElementById('report-list').innerHTML = html;
  })
  .catch(function(err) {
    document.getElementById('report-list').innerHTML = '<div class="loading">Unable to load forecasts. Please refresh.</div>';
  });
</script>
</body>
</html>
